name: Build And Release Mod On PR Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build mod jar
        run: ./gradlew --no-daemon clean build

      - name: Read mod version from gradle.properties
        id: mod_meta
        shell: bash
        run: |
          MOD_VERSION="$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)"
          if [ -z "$MOD_VERSION" ]; then
            echo "Failed to read mod_version from gradle.properties"
            exit 1
          fi
          echo "mod_version=$MOD_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$MOD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload jars to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.mod_meta.outputs.release_tag }}
          name: HorrorCooked9 ${{ steps.mod_meta.outputs.mod_version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
